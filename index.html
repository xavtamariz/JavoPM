<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JavoPM</title>
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("javopm-theme");
          if (theme === "dark" || theme === "light") {
            document.documentElement.dataset.theme = theme;
          }
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <script>
      window.JAVOPM_CONFIG = window.JAVOPM_CONFIG || {
        supabaseAnonKey: "sb_publishable_6F0OvBjCODRMSD6xsjK1wg_pumlnBWu",
        supabaseUrl: "https://scoacquwvbchdsldxaep.supabase.co"
      };
    </script>
    <link rel="stylesheet" href="./styles.css?v=20260525-folio-remap" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header" aria-label="Encabezado del tablero">
        <div class="brand-block">
          <p class="eyebrow">Local-first Kanban</p>
          <h1 class="visually-hidden">JavoPM</h1>
        </div>
        <div class="header-actions">
          <div class="header-action-row">
            <button
              class="account-menu-button"
              type="button"
              data-account-menu-toggle
              aria-expanded="false"
              aria-haspopup="dialog"
            >
              <span class="account-menu-label">Cuenta</span>
            </button>
            <div class="project-menu" data-project-menu>
              <button
                class="project-menu-button"
                type="button"
                data-project-menu-toggle
                aria-expanded="false"
                aria-haspopup="dialog"
              >
                <span class="project-menu-label">Proyectos</span>
              </button>
            </div>
            <button
              class="team-menu-button"
              type="button"
              data-team-menu-toggle
              aria-expanded="false"
              aria-haspopup="dialog"
            >
              <span class="team-menu-label">Equipo</span>
            </button>
            <button
              class="theme-toggle"
              type="button"
              data-theme-toggle
              aria-label="Cambiar a tema oscuro"
              aria-pressed="false"
            >
              <span class="theme-dot" aria-hidden="true"></span>
              <span data-theme-label>Claro</span>
            </button>
            <button
              class="side-menu-toggle"
              type="button"
              data-side-menu-toggle
              aria-controls="side-menu"
              aria-expanded="false"
              aria-label="Abrir menú lateral"
            >
              <span class="side-menu-icon" aria-hidden="true">
                <span></span>
                <span></span>
              </span>
            </button>
          </div>
        </div>
      </header>

      <main class="board-wrap" aria-label="Tablero de tareas">
        <section id="board" class="board" aria-live="polite"></section>
      </main>
    </div>

    <div class="side-menu-overlay" data-side-menu-overlay hidden>
      <aside id="side-menu" class="side-menu" role="dialog" aria-modal="true" aria-labelledby="side-menu-title">
        <div class="side-menu-topbar">
          <h2 id="side-menu-title">Menú</h2>
          <button class="close-button" type="button" data-side-menu-close aria-label="Cerrar menú lateral">×</button>
        </div>
        <div class="side-menu-body">
          <div class="side-menu-section">
            <div class="header-status" data-sync-status data-sync-state="local" aria-live="polite">
              <span class="status-dot" aria-hidden="true"></span>
              <span data-sync-label>Guardado local</span>
            </div>
          </div>
        </div>
      </aside>
    </div>

    <div id="modal-root"></div>

    <script type="module" src="./app.js?v=20260525-folio-remap"></script>
  </body>
</html>
