<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JavoPM</title>
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("javopm-theme");
          if (theme === "dark" || theme === "light") {
            document.documentElement.dataset.theme = theme;
          }
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="stylesheet" href="./styles.css?v=20260523-percent" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header" aria-label="Encabezado del tablero">
        <div class="brand-block">
          <p class="eyebrow">Local-first Kanban</p>
          <h1 class="visually-hidden">JavoPM</h1>
        </div>
        <div class="header-actions">
          <div class="header-action-row">
            <div class="project-menu" data-project-menu>
              <button
                class="project-menu-button"
                type="button"
                data-project-menu-toggle
                aria-expanded="false"
                aria-haspopup="dialog"
              >
                <span class="project-menu-label">Proyectos</span>
              </button>
            </div>
            <button
              class="theme-toggle"
              type="button"
              data-theme-toggle
              aria-label="Cambiar a tema oscuro"
              aria-pressed="false"
            >
              <span class="theme-dot" aria-hidden="true"></span>
              <span data-theme-label>Tema claro</span>
            </button>
          </div>
          <div class="header-action-row">
            <button
              class="team-menu-button"
              type="button"
              data-team-menu-toggle
              aria-expanded="false"
              aria-haspopup="dialog"
            >
              <span class="team-menu-label">Equipo</span>
            </button>
            <div class="header-status" aria-live="polite">
              <span class="status-dot" aria-hidden="true"></span>
              Guardado local
            </div>
          </div>
        </div>
      </header>

      <main class="board-wrap" aria-label="Tablero de tareas">
        <section id="board" class="board" aria-live="polite"></section>
      </main>
    </div>

    <div id="modal-root"></div>

    <script type="module" src="./app.js?v=20260523-percent"></script>
  </body>
</html>
